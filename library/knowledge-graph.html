<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Knowledge Graph | SUPER CURVE TERMINAL</title>
  <link rel="stylesheet" href="../assets/css/style.css?v=kgfix1">
  <style>
    .kg-tools {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 12px;
      margin-top: 28px;
    }

    .kg-tools input {
      width: 100%;
      padding: 16px 18px;
      border-radius: 12px;
      border: 1px solid rgba(120, 160, 220, 0.35);
      background: rgba(10, 20, 36, 0.9);
      color: #eaf2ff;
      font-size: 16px;
      outline: none;
    }

    .kg-tools a {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 0 18px;
      border-radius: 12px;
      border: 1px solid rgba(245, 181, 55, 0.55);
      background: rgba(245, 181, 55, 0.14);
      color: #ffc94a;
      font-weight: 700;
      text-decoration: none;
      white-space: nowrap;
    }

    .kg-stats {
      margin-top: 18px;
      color: #9fb4d8;
      font-size: 14px;
    }

    .kg-grid {
      margin-top: 24px;
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 16px;
    }

    .kg-card {
      display: block;
      padding: 18px;
      border-radius: 14px;
      border: 1px solid rgba(120, 160, 220, 0.25);
      background: linear-gradient(180deg, rgba(18, 34, 58, 0.92), rgba(10, 18, 32, 0.92));
      color: inherit;
      text-decoration: none;
    }

    .kg-card strong {
      display: block;
      color: #eaf2ff;
      font-size: 16px;
      margin-bottom: 8px;
    }

    .kg-card p {
      margin: 0;
      color: #9fb4d8;
      font-size: 14px;
      line-height: 1.7;
    }

    .kg-meta {
      margin-top: 10px;
      color: #ffc94a;
      font-size: 12px;
      letter-spacing: 0.05em;
    }

    .kg-related {
      margin-top: 12px;
      color: #8fb3df;
      font-size: 12px;
      line-height: 1.6;
    }

    @media (max-width: 900px) {
      .kg-grid {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }
    }

    @media (max-width: 640px) {
      .kg-tools {
        grid-template-columns: 1fr;
      }

      .kg-tools a {
        height: 48px;
      }

      .kg-grid {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
<header>
  <h1>SUPER CURVE TERMINAL</h1>
  <nav>
    <a href="/finance-portal/">Home</a>
    <a href="/finance-portal/handbook/">Handbook</a>
    <a href="/finance-portal/dashboard/">Dashboard</a>
    <a href="/finance-portal/library/">Library</a>
    <a href="/finance-portal/search/">AI Search</a>
  </nav>
</header>

<main>
  <section class="terminal-hero">
    <p class="terminal-subtitle">KNOWLEDGE GRAPH</p>
    <h1>Knowledge Graph</h1>
    <p>Relationships between concepts. JSON Knowledge Graphを読み込み、概念同士の関係をカード形式で表示します。</p>

    <div class="kg-tools">
      <input id="kgSearch" type="search" placeholder="例：Gamma, Vanna, Charm, 0DTE">
      <a href="/finance-portal/api/graph.json" target="_blank" rel="noopener">Raw JSON</a>
    </div>

    <div id="kgStats" class="kg-stats">Loading graph...</div>
    <div id="kgGrid" class="kg-grid"></div>
  </section>
</main>

<footer>
  <hr>
  <p>© SUPER CURVE</p>
</footer>

<script>
let nodes = [];

function escapeHtml(str) {
  return String(str || "").replace(/[&<>"']/g, s => ({
    "&": "&amp;",
    "<": "&lt;",
    ">": "&gt;",
    '"': "&quot;",
    "'": "&#039;"
  }[s]));
}

function normalizeNode(node) {
  return {
    id: node.id || "",
    title: node.title || node.name || node.id || "Untitled",
    type: node.type || node.category || "concept",
    category: node.category || node.type || "concept",
    url: node.url || node.href || "#",
    summary: node.summary || node.description || node.text || "",
    tags: Array.isArray(node.tags) ? node.tags : [],
    related: Array.isArray(node.related) ? node.related : [],
    dashboards: Array.isArray(node.dashboards) ? node.dashboards : [],
    research: Array.isArray(node.research) ? node.research : [],
    charts: Array.isArray(node.charts) ? node.charts : [],
    news: Array.isArray(node.news) ? node.news : []
  };
}

function render(query = "") {
  const q = query.trim().toLowerCase();
  const grid = document.getElementById("kgGrid");
  const stats = document.getElementById("kgStats");

  const filtered = nodes.filter(node => {
    const haystack = [
      node.id,
      node.title,
      node.type,
      node.category,
      node.summary,
      node.tags.join(" "),
      node.related.join(" ")
    ].join(" ").toLowerCase();

    return !q || haystack.includes(q);
  });

  stats.textContent = `${filtered.length} / ${nodes.length} concepts`;

  grid.innerHTML = "";

  for (const node of filtered) {
    const related = node.related.length
      ? `<div class="kg-related">Related: ${escapeHtml(node.related.join(", "))}</div>`
      : "";

    const tags = node.tags.length
      ? `<div class="kg-meta">${escapeHtml(node.tags.join(" / "))}</div>`
      : `<div class="kg-meta">${escapeHtml(node.category)}</div>`;

    const a = document.createElement("a");
    a.className = "kg-card";
    a.href = node.url || "#";
    a.innerHTML = `
      <strong>${escapeHtml(node.title)}</strong>
      <p>${escapeHtml(node.summary)}</p>
      ${tags}
      ${related}
    `;
    grid.appendChild(a);
  }
}

async function loadGraph() {
  try {
    const res = await fetch("/finance-portal/api/graph.json", { cache: "no-store" });
    if (!res.ok) throw new Error("graph.json load failed");

    const json = await res.json();

    if (Array.isArray(json.nodes)) {
      nodes = json.nodes.map(normalizeNode);
    } else if (Array.isArray(json.graph)) {
      nodes = json.graph.map(normalizeNode);
    } else if (Array.isArray(json)) {
      nodes = json.map(normalizeNode);
    } else if (Array.isArray(json.items)) {
      nodes = json.items.map(normalizeNode);
    } else {
      nodes = [];
    }

    render("");
  } catch (e) {
    document.getElementById("kgStats").textContent = "Knowledge Graphを読み込めませんでした。";
    console.error(e);
  }
}

document.getElementById("kgSearch").addEventListener("input", e => {
  render(e.target.value);
});

loadGraph();
</script>
</body>
</html>
