<!doctype html><html lang="ja"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>USDJPY Dashboard</title><link rel="stylesheet" href="../assets/css/style.css"></head><body><main class="shell"><section class="hero"><p class="eyebrow">Dashboard</p><h1 id="title"></h1><p id="summary" class="lead"></p></section><section id="metrics" class="metric"></section><section class="card"><h2>Interpretation</h2><p id="interp"></p></section></main><script src="../assets/js/app.js"></script><script>fetchJson('../data/dashboards/usdjpy.json').then(d=>{title.textContent=d.title;summary.textContent=d.summary;metrics.innerHTML=d.metrics.map(m=>'<div class="box"><div class="label">'+m.label+'</div><div class="value">'+m.value+'</div><div class="label">'+m.note+'</div></div>').join('');interp.textContent=d.interpretation})</script></body></html>
