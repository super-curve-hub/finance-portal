<!doctype html><html lang="ja"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>GEX Dashboard</title><link rel="stylesheet" href="../assets/css/style.css"></head><body><main class="shell"><section class="hero"><p class="eyebrow">Dealer Positioning</p><h1>GEX Dashboard</h1><p class="lead">Net GEX、Gamma Flip、Call Wall、Put Wall、Vanna、Charm、0DTEを統合し、ディーラーのヘッジ行動を推定します。</p></section><section id="metrics" class="metric"></section><section class="two section"><div class="card"><h2>Strike Map</h2><div id="strikeChart"></div></div><div class="card"><h2>Regime</h2><p id="regime"></p><h2>Dealer Action</h2><p id="dealerAction"></p><h2>Trader Watch</h2><ul id="watch"></ul></div></section></main><script src="../assets/js/app.js"></script><script src="../assets/js/charts.js"></script><script>fetchJson('../data/dashboards/gex.json').then(d=>{metrics.innerHTML=d.metrics.map(m=>`<div class="box"><div class="label">${m.label}</div><div class="value">${m.value}</div><div class="label">${m.note}</div></div>`).join('');regime.textContent=d.regime.interpretation;dealerAction.textContent=d.regime.dealer_action;watch.innerHTML=d.trader_watch.map(x=>`<li>${x}</li>`).join('');renderBarChart(strikeChart,d.strike_map,'strike','gex')})</script></body></html>
