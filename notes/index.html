<!doctype html><html lang="ja"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Macro Library</title><link rel="stylesheet" href="../assets/css/style.css?v=homefix1"></head><body><main class="shell"><section class="hero"><p class="eyebrow">Macro Library</p><h1>Research Notes</h1><p class="lead">市場構造、バックテスト、マクロ、原油、海運、金利、為替介入のリサーチを蓄積します。</p></section><section id="notes" class="grid"></section></main><script src="../assets/js/app.js"></script><script>fetchJson('../data/research/index.json').then(d=>{notes.innerHTML=d.research.map(r=>`<article class="card"><h3>${r.title}</h3><p>${r.summary}</p><div class="tags">${r.tags.map(t=>`<span class="tag">${t}</span>`).join('')}</div></article>`).join('')})</script></body></html>
