<section class="terminal-hero">

    <h1>{{title}}</h1>

    <p class="terminal-subtitle">

        {{subtitle}}

    </p>

    <div class="terminal-hero-box">

        <h2>{{hero_headline}}</h2>

        <p>

            {{hero_description}}

        </p>

    </div>

</section>


<section>

    <h2>Modules</h2>

    <div class="terminal-grid">

        {{modules}}

    </div>

</section>


<section>

    <h2>Latest Handbook</h2>

    <div class="terminal-grid">

        {{latest}}

    </div>

</section>


<section>

    <h2>Knowledge Graph</h2>

    <div class="terminal-panel">

        <p>

            Total Concepts

            <strong>{{graph_count}}</strong>

        </p>

    </div>

</section>


<section>

    <h2>Development Roadmap</h2>

    <div class="terminal-panel">

        {{roadmap}}

    </div>

</section>
