<!doctype html><html lang="ja"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Search | Super Curve</title><link rel="stylesheet" href="../assets/css/style.css"></head><body><main class="shell section"><a class="chip" href="../index.html">← Top</a><h1>Search</h1><div class="searchbox"><input id="q" placeholder="検索語を入力"></div><div id="results" class="term-list"></div></main><script>
let data=[];fetch('../data/glossary.json').then(r=>r.json()).then(j=>{data=j;render('')});function render(q){const s=q.toLowerCase();results.innerHTML=data.filter(x=>JSON.stringify(x).toLowerCase().includes(s)).map(x=>`<article class='card'><h3>${x.term}</h3><p>${x.simple}</p><a href='../index.html#${x.id}'>開く</a></article>`).join('')}q.oninput=e=>render(e.target.value)
</script></body></html>
