<!doctype html><html lang="ja"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Gamma Flip</title><link rel="stylesheet" href="../assets/css/style.css"></head><body><main class="shell"><section id="term" class="hero"></section><section class="two"><article class="card"><h2>詳しい説明</h2><p id="desc"></p><h2>Dealer Flow</h2><p id="dealer"></p><h2>Trader View</h2><ul id="trader"></ul></article><aside class="card"><h2>Related</h2><div id="related" class="tags"></div><h2>Memo</h2><textarea class="memo" id="memo" placeholder="自分用メモ"></textarea></aside></section></main><script src="../assets/js/app.js"></script><script>fetchJson('../data/concepts/gamma-flip.json').then(x=>{term.innerHTML=`<p class="eyebrow">${x.category}</p><h1>${x.title}</h1><p class="lead">${x.plain_jp}</p><p>${x.summary}</p><div class="tags">${x.tags.map(t=>`<span class="tag">${t}</span>`).join('')}</div>`;desc.textContent=x.description;dealer.textContent=x.dealer_action;trader.innerHTML=x.trader_watch.map(i=>`<li>${i}</li>`).join('');related.innerHTML=x.related.map(r=>`<a class="chip" href="../search/?q=${r}">${r}</a>`).join('');memo.value=localStorage.getItem('memo-gamma-flip')||'';memo.oninput=()=>localStorage.setItem('memo-gamma-flip',memo.value)})</script></body></html>
