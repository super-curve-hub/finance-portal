<!doctype html><html lang="ja"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Option Handbook</title><link rel="stylesheet" href="../assets/css/style.css"></head><body><main class="shell"><section class="hero"><p class="eyebrow">Option Handbook</p><h1>100 Terms Dictionary</h1><p class="lead">オプション、ボラティリティ、GEX、Vanna、Charm、Dealer Flowを実務向けに整理します。</p></section><section id="concepts" class="grid"></section></main><script src="../assets/js/app.js"></script><script>Promise.all(['../data/concepts/gamma-flip.json','../data/concepts/gex.json','../data/concepts/vanna.json','../data/concepts/charm.json','../data/concepts/dealer-long-gamma.json','../data/concepts/zero-dte.json'].map(fetchJson)).then(rows=>{concepts.innerHTML=rows.map(x=>`<article class="card"><button class="star" onclick="localStorage.setItem('fav-${x.id}','1')">⭐</button><h3>${x.title}</h3><p>${x.summary}</p><p><b>一言:</b> ${x.plain_jp}</p><div class="tags">${x.tags.map(t=>`<span class="tag">${t}</span>`).join('')}</div><p><a class="btn" href="${x.page}">Open</a></p></article>`).join('')})</script></body></html>
